<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplication Table using functions in JavaScript</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Multiplication Table using functions in JavaScript</h1>
    <input type="number" id="number" placeholder="Enter a number">
    <button onclick="generateTable()">Generate Table</button>
    <div id="result"></div>

    <script>
        function generateTable() {
            const number = document.getElementById('number').value;
            let result = `<h2>Multiplication Table for ${number}</h2><ul>`;
            for (let i = 1; i <= 20; i++) {
                result += `<li>${number} x ${i} = ${number * i}</li>`;
            }
            result += '</ul>';
            document.getElementById('result').innerHTML = result;
        }
    </script>



</body>
</html>
