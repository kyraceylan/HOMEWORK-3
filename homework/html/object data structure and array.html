<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head><body>
    <script>
        let student = {
            name: "John",
            age: 20,
            grade: "A"
        };

        console.log(student.name); // Output: John
        console.log(student.age); // Output: 20
        console.log(student.grade); // Output: A

        student.age = 21; // Update age
        console.log(student.age); // Output: 21

        delete student.grade; // Remove grade property
        console.log(student.grade); // Output: undefined
    </script>
</body>

</html>
