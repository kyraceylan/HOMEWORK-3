<!DOCTYPE html>
<head>
    <title>hobby slecter</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz" crossorigin="anonymous"></script>    

</head>
    <script>
        function displayHobby() {
            const hobby = document.getElementById('hobbyInput').value;
            document.getElementById('hobbyResult').innerText = `Your selected hobby is: ${hobby}`;
        }
    </script>
</head>
<body>
    <div class="container mt-5">
        <h1 class="mb-4">Hobby Selector</h1>
        <div class="mb-3">
            <label for="hobbyInput" class="form-label">Select your favorite hobby:</label>
            <select id="hobbyInput" class="form-select">
                <option value="Reading">Reading</option>
                <option value="Traveling">Traveling</option>
                <option value="Cooking">Cooking</option>
                <option value="Gardening">Gardening</option>
                <option value="Photography">Photography</option>
                <option value="Painting">Painting</option>
                <option value="Hiking">Hiking</option>
                <option value="Gaming">Gaming</option>
                <option value="Music">Music</option>
                <option value="Dancing">Dancing</option>
                <option value="Crafting">Crafting</option>
                <option value="Fishing">Fishing</option>
                <option value="Yoga">Yoga</option>
                <option value="Cycling">Cycling</option>
                <option value="Writing">Writing</option>
                <option value="Knitting">Knitting</option>
                <option value="Bird Watching">Bird Watching</option>
                <option value="Collecting">Collecting</option>
                <option value="Volunteering">Volunteering</option>
                <option value="Meditation">Meditation</option>
                <option value="Woodworking">Woodworking</option>
                <objection value="Astronomy">Astronomy</option>
                <option value="other">other</option>
            </select>
        </div>
        <button class="btn btn-primary" onclick="displayHobby()">Submit</button>
        <div class="mt-4">
            <h2 id="hobbyResult"></h2>
        </div>
    </div>
    <footer class="text-center mt-5">
        <p>&copy; 2024 Hobby Selector. All rights reserved.</p>
    </footer>
</body>
</html>
