<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unequal Grids</title>
    <style>
        .container {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr; /* Unequal column widths */
            gap: 10px; /* Space between grid items */
        }
        .item {
            background-color: lightblue;
            padding: 20px;
            text-align: center;
        }
    </style>
</head><body>
    <div class="container">
        <div class="item">Column 1</div>
        <div class="item">Column 2 (wider)</div>
        <div class="item">Column 3</div>
    </div>
</body></html>
