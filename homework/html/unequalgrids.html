<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unequal Grids</title>
    <style>
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr; /* Unequal column widths */
            gap: 10px; /* Space between grid items */
        }
        .grid-item {
            background-color: lightblue;
            padding: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Unequal Grids Example</h1>
    <div class="grid-container">
        <div class="grid-item">Column 1 (1fr)</div>
        <div class="grid-item">Column 2 (2fr)</div>
        <div class="grid-item">Column 3 (1fr)</div>
    </div>
</body>
</html>
